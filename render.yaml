services:
  - type: web
    name: chess-analyzer-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false          # set this in Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # fallback — set this in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: DEBUG
        value: "false"
